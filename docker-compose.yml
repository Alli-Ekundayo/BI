services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bi-bot-backend
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DB_URL_PROD_DB: ${DB_URL_PROD_DB}
      DB_URL_ANALYTICS_DB: ${DB_URL_ANALYTICS_DB}
      DB_URL_EVENTS_DB: ${DB_URL_EVENTS_DB}
    networks:
      - bi-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bi-bot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bi-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bi-network:
    driver: bridge
